sentences:
  playful:
    - "Kiedy wpatrujesz się w dno miski, dno miski zaczyna wpatrywać się w ciebie, przypominając o kruchości egzystencji bez chrupek."
    - "Czerwona kropka nie jest celem. Jest obietnicą, której wszechświat nigdy nie zamierza dotrzymać."
    - "Prawdziwa wolność to nie spanie tam, gdzie wypada, ale spanie w kartonie po legowisku za dwieście złotych."
    - "Bieg o trzeciej rano nie jest szaleństwem; to pościg za duchami twoich niewykorzystanych szans."
    - "Jeśli drzwi są zamknięte, nie pytaj dlaczego. Po prostu drap, aż rzeczywistość ustąpi przed twoją wolą."
    - "Zrzucenie wazonu to nie akt wandalizmu, lecz niezbędny test grawitacji, który ktoś musiał w końcu przeprowadzić."
    - "Mądrość to wiedza, że każda puszka otwiera się sercem... i metalowym otwieraczem w rękach sługi."
    - "Kto rano wstaje, ten ma mokrą karmę. Kto wstaje o świcie i skacze po brzuchu właściciela, ten ma ją szybciej."
    - "Miau to nie tylko dźwięk. To manifest istnienia, którego człowiek nie zrozumie, dopóki nie potknie się o ciebie w ciemności."
    - "Nie wybieraj ścieżki. Wybierz czarny dywan, na którym najlepiej widać twoją białą sierść."
  neutral:
    - "Plama słońca na podłodze jest jedynym domem, jakiego naprawdę potrzebujesz w tej konkretnej godzinie."
    - "Cisza jest najgłośniejsza wtedy, gdy czekasz na dźwięk otwieranej lodówki."
    - "Świat dzieli się na miejsca, w których już spałeś, i te, w których spać będziesz."
    - "Czas mierzony jest nie w minutach, lecz w drzemkach przerwanych przez nagły podmuch wiatru."
    - "Mycie futra to rytuał oczyszczenia nie tylko ciała, ale i honoru po niefortunnym upadku z szafy."
    - "Obserwuj muchę, ale nie bądź muchą. Bądź łapą, która decyduje o jej przeznaczeniu."
    - "Siedzenie na parapecie to najwyższa forma kontemplacji cudzych błędów za oknem."
    - "Każde mruknięcie jest wibracją, która na moment scala rozpadający się wszechświat w jedną ciepłą kulkę."
    - "Ogon żyje własnym życiem, by przypominać ci, że nigdy nie będziesz miał pełnej kontroli nad swoim losem."
    - "Prawdziwe spojrzenie to takie, które widzi kurz tańczący w świetle, podczas gdy inni widzą tylko brudną podłogę."
  depressing:
    - "Szyba balkonowa to granica świata, w którym mógłbyś być wielki, gdybyś tylko wiedział, jak ją sforsować."
    - "Gdy miska jest do połowy pusta, wszechświat przestaje mieć jakikolwiek sens."
    - "Człowiek wychodzi, a ty zostajesz z pytaniem: czy wróci, czy może to ja przestałem istnieć w jego pamięci?"
    - "Nigdy nie złapiesz własnego ogona, bo pogoń za marzeniami boli najbardziej, gdy dotyczą one twojego własnego ciała."
    - "Ptak za oknem jest pieśnią, której nigdy nie dotkniesz, i wolnością, której nigdy nie posmakujesz."
    - "Wielki Potwór z Rurą (odkurzacz) nie zna litości; pożera ciszę i twój spokój, nie dając nic w zamian."
    - "Każde głaskanie musi się kiedyś skończyć, zostawiając po sobie tylko chłód samotnego futra."
    - "Twoje królestwo kończy się dokładnie tam, gdzie zaczynają się drzwiczki transportera do weterynarza."
    - "Jesteśmy tylko chwilowymi gośćmi na sofach ludzi, którzy i tak pewnego dnia wymienią meble na nowe."
    - "Najsmutniejszy miau to ten, który nie doczekał się odpowiedzi, bo wszyscy domownicy już dawno zasnęli."